gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                           always;
    add_header X-Frame-Options           "SAMEORIGIN"                        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
    add_header X-XSS-Protection          "1; mode=block"                     always;

    # ── SEO static files — served directly, never SPA-fallback ───────────────
    location = /robots.txt {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /sitemap.xml {
        try_files $uri =404;
        add_header Content-Type "application/xml; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
    }

    # ── Proxy API requests to backend ─────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
        proxy_pass http://backend:8000/health;
    }

    # ── Long-lived cache for hashed Vite assets ───────────────────────────────
    # Vite fingerprints JS/CSS bundles (assets/index-[hash].js) so 1-year TTL is safe.
    location ~* ^/assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Images, fonts, and other static media ────────────────────────────────
    location ~* \.(ico|png|jpg|jpeg|webp|avif|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── SPA fallback — all other routes serve index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
