gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    # NOTE: nginx does NOT inherit add_header directives into child location
    # blocks that define their own add_header.  Every location block that sets
    # Cache-Control (or any other header) must therefore repeat the full set of
    # security headers.  The server-block declarations below only cover
    # locations that set NO headers of their own (e.g. /api/, /health).
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options   "nosniff"                              always;
    add_header X-Frame-Options          "SAMEORIGIN"                           always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"      always;
    add_header X-XSS-Protection         "1; mode=block"                        always;
    add_header Permissions-Policy       "camera=(), geolocation=(), microphone=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

    # ── SEO static files — served directly, never SPA-fallback ───────────────
    location = /robots.txt {
        try_files $uri =404;
        # Repeat security headers — nginx drops parent add_header when a
        # location defines its own.
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options   "nosniff"                              always;
        add_header X-Frame-Options          "SAMEORIGIN"                           always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"      always;
        add_header X-XSS-Protection         "1; mode=block"                        always;
        add_header Permissions-Policy       "camera=(), geolocation=(), microphone=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
        add_header Cache-Control            "public, max-age=86400"                always;
    }

    location = /sitemap.xml {
        try_files $uri =404;
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options   "nosniff"                              always;
        add_header X-Frame-Options          "SAMEORIGIN"                           always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"      always;
        add_header X-XSS-Protection         "1; mode=block"                        always;
        add_header Permissions-Policy       "camera=(), geolocation=(), microphone=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
        add_header Content-Type             "application/xml; charset=utf-8"       always;
        add_header Cache-Control            "public, max-age=3600"                 always;
    }

    # ── Proxy API requests to backend ─────────────────────────────────────────
    # No add_header here — security headers are inherited from the server block.
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass         http://backend:8000/health;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Long-lived cache for hashed Vite assets ───────────────────────────────
    # Vite fingerprints JS/CSS bundles (assets/index-[hash].js) so 1-year TTL is safe.
    location ~* ^/assets/ {
        try_files $uri =404;
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options   "nosniff"                              always;
        add_header X-Frame-Options          "SAMEORIGIN"                           always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"      always;
        add_header X-XSS-Protection         "1; mode=block"                        always;
        add_header Permissions-Policy       "camera=(), geolocation=(), microphone=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
        add_header Cache-Control            "public, max-age=31536000, immutable"  always;
    }

    # ── Images, fonts, and other static media ────────────────────────────────
    location ~* \.(ico|png|jpg|jpeg|webp|avif|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options   "nosniff"                              always;
        add_header X-Frame-Options          "SAMEORIGIN"                           always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"      always;
        add_header X-XSS-Protection         "1; mode=block"                        always;
        add_header Permissions-Policy       "camera=(), geolocation=(), microphone=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
        add_header Cache-Control            "public, max-age=2592000"              always;
    }

    # ── SPA fallback — all other routes serve index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options   "nosniff"                              always;
        add_header X-Frame-Options          "SAMEORIGIN"                           always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"      always;
        add_header X-XSS-Protection         "1; mode=block"                        always;
        add_header Permissions-Policy       "camera=(), geolocation=(), microphone=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
        add_header Cache-Control            "no-cache, no-store, must-revalidate"  always;
    }
}
